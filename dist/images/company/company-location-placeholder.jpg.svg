<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f1f5f9" />
  
  <!-- 网格背景 -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="20" height="20" fill="#f1f5f9"/>
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)" />
  
  <!-- 中心图标 -->
  <g transform="translate(400, 180)">
    <circle cx="0" cy="0" r="50" fill="#4facfe" opacity="0.1" />
    <path d="M0,-30 C-16.6,-30 -30,-16.6 -30,0 C-30,25 0,50 0,50 C0,50 30,25 30,0 C30,-16.6 16.6,-30 0,-30 Z" fill="#4facfe" />
    <circle cx="0" cy="0" r="10" fill="white" />
  </g>
  
  <!-- 文本 -->
  <g transform="translate(400, 260)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">杭州朗德智能科技有限公司</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748b">浙江省杭州市滨江区科技园区创新大厦A座15楼</text>
  </g>
  
  <!-- 装饰元素 -->
  <g stroke="#cbd5e1" stroke-width="1" opacity="0.5">
    <circle cx="400" cy="200" r="100" fill="none" />
    <circle cx="400" cy="200" r="150" fill="none" />
    <circle cx="400" cy="200" r="200" fill="none" />
  </g>
</svg> 