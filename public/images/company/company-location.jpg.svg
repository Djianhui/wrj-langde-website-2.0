<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f5f7fa" />
  
  <!-- 网格线 -->
  <g stroke="#e2e8f0" stroke-width="1">
    <!-- 横线 -->
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="250" x2="800" y2="250" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="350" x2="800" y2="350" />
    
    <!-- 竖线 -->
    <line x1="50" y1="0" x2="50" y2="400" />
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="250" y1="0" x2="250" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="350" y1="0" x2="350" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="550" y1="0" x2="550" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="650" y1="0" x2="650" y2="400" />
    <line x1="700" y1="0" x2="700" y2="400" />
    <line x1="750" y1="0" x2="750" y2="400" />
  </g>
  
  <!-- 主要道路 -->
  <g stroke="#cbd5e1" stroke-width="8" stroke-linecap="round">
    <line x1="200" y1="50" x2="200" y2="350" />
    <line x1="100" y1="200" x2="700" y2="200" />
    <line x1="500" y1="100" x2="700" y2="300" />
  </g>
  
  <!-- 次要道路 -->
  <g stroke="#cbd5e1" stroke-width="4" stroke-linecap="round">
    <line x1="300" y1="100" x2="300" y2="300" />
    <line x1="400" y1="150" x2="400" y2="250" />
    <line x1="500" y1="50" x2="500" y2="350" />
    <line x1="100" y1="100" x2="300" y2="100" />
    <line x1="100" y1="300" x2="300" y2="300" />
  </g>
  
  <!-- 公司位置标记 -->
  <g transform="translate(400, 200)">
    <!-- 外圈光晕 -->
    <circle cx="0" cy="0" r="30" fill="#4facfe" opacity="0.2" />
    <circle cx="0" cy="0" r="20" fill="#4facfe" opacity="0.4" />
    
    <!-- 位置标记 -->
    <path d="M0,-15 C-8,-15 -15,-8 -15,0 C-15,12 0,25 0,25 C0,25 15,12 15,0 C15,-8 8,-15 0,-15 Z" fill="#4facfe" />
    <circle cx="0" cy="0" r="5" fill="white" />
  </g>
  
  <!-- 公司地址文本 -->
  <g transform="translate(400, 120)">
    <rect x="-150" y="-25" width="300" height="50" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" />
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#0f172a">杭州朗德智能科技有限公司</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" dominant-baseline="middle" fill="#64748b">浙江省杭州市滨江区科技园区创新大厦A座15楼</text>
  </g>
  
  <!-- 比例尺 -->
  <g transform="translate(700, 350)">
    <rect x="-80" y="-15" width="80" height="30" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1" />
    <line x1="-70" y1="5" x2="-20" y2="5" stroke="#0f172a" stroke-width="2" />
    <text x="-45" y="-5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">500米</text>
  </g>
  
  <!-- 指北针 -->
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="20" fill="white" stroke="#e2e8f0" stroke-width="1" />
    <path d="M0,-15 L5,5 L0,0 L-5,5 Z" fill="#4facfe" />
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">N</text>
  </g>
</svg> 